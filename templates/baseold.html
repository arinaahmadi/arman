<!DOCTYPE html>
{% load static %}
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دره درخت (Tree Valley)</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body>

  <!-- ==================== HEADER ==================== -->
  <header>
    <div class="logo">
      <img src="{% static 'images/logo.png' %}" alt="لوگو" />
      <p>زندگی مدرن در کنار طبیعت</p>
    </div>

    <!-- دکمه منوی همبرگری -->
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav>
      <a href="{% url 'managebar:index' %}"
        class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">خانه</a>
      <a href="{% url 'managebar:projs' %}"
        class="{% if request.resolver_match.url_name == 'projs' %}active{% endif %}">پروژه‌ها</a> <a href="#">وبلاگ</a>
      <a href="#">درباره ما</a>
      <a href="#">تماس با ما</a>
    </nav>
  </header>

  <!-- ==================== MAIN PAGE ==================== -->
  <main>

    {% block content %}

    {% endblock %}


  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer>
    <p>© 1405 دره درخت. تمامی حقوق محفوظ است.</p>
    <div class="social">
      <a href="#">G+</a>
      <a href="#">✉</a>
      <a href="#">f</a>
      <a href="#">🐦</a>
    </div>
  </footer>

  <script src="{% static 'js/main.js' %}"></script>
</body>

</html>
