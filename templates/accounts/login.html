{% load static %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="adminHMD authentication page">
    <title>Login | adminHMD</title>

    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/vendors/bootstrap-icons/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body class="auth-body">
    <button class="icon-button theme-toggle auth-theme-toggle" type="button" data-theme-toggle
        aria-label="Switch color theme" title="Switch color theme">
        <i class="bi bi-moon-stars" data-theme-icon aria-hidden="true"></i>
    </button>
    <main class="auth-page">

        <section class="auth-card">
            <a class="auth-brand" href="{% url 'accounts:login' %}"><span class="brand-icon"><i
                        class="bi bi-grid-1x2-fill" aria-hidden="true"></i></span><span><strong>مدیریت
                        آرمان</strong><small>ورود به مدیریت آرمان</small></span></a>
            <div class="auth-visual"><img src="{% static 'assets/images/png/dasher-ui-bootstrap-5.jpg' %}"
                    alt="adminHMD dashboard interface"></div>
            <form class="needs-validation" action="{% url 'accounts:login' %}" method="post">
                {% csrf_token %}
                <div class="mb-3"><label class="form-label" for="loginEmail">نام کاربری</label>
                    <input class="form-control" name="username" type="text" required>
                    <div class="invalid-feedback">نام کاربری را وارد کنید</div>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label" for="loginPassword">کلمه عبور</label>
                        <a class="small fw-semibold" href="forgot-password.html">قراموشی رمز</a></div>
                        <input class="form-control" name="password" type="password" minlength="6" required>
                    <div class="invalid-feedback">طول رمز 8 حرف باید باشد</div>
                </div>
                <div class="form-check mb-4">
                    <label class="form-check-label" for="rememberMe">مرا بخاطر داشته باش</label>
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                </div>
                <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right"
                        aria-hidden="true"></i>
                    ورود</button>
            </form>

            <div class="auth-footer"> <a href="#">ایجاد نام کاربری</a></div>
        </section>


    </main>

    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>
</body>

</html>
