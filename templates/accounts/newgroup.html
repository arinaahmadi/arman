{% extends 'base.html' %}
{% load static %}
{% block content %}


<div class="page-heading">
    <div class="page-heading-copy">
        <span class="page-icon"><i class="bi bi-person-plus" aria-hidden="true"></i></span>
        <div>
            <p class="eyebrow mb-1">مدیریت</p>
            <h1 class="h3 mb-1">گروه جدید</h1>
            <p class="text-muted mb-0">Create a new user account with role and team assignments.</p>
        </div>
    </div>
    <div class="heading-actions"><a class="btn btn-outline-secondary btn-sm" href="{% url 'accounts:users' %}"><i
                class="bi bi-arrow-left" aria-hidden="true"></i> برگشت به کاربران</a></div>
</div>


<section class="row g-3">
    <div class="col-12 col-xl-12">
        <form class="panel needs-validation" action="{% url 'accounts:newgroup' %}" method="post">
            {% csrf_token %}
            <div class="panel-header">
                <div>
                    <h2 class="h5 mb-1 section-title"><i class="bi bi-person-plus" aria-hidden="true"></i><span>User
                            Information</span></h2>
                    <p class="text-muted mb-0">ایجاد گروه جدید</p>
                </div>
            </div>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label" for="firstName">نام گروه</label><input
                        class="form-control" name="name" type="text" required>
                    <div class="invalid-feedback">نام گروه الزامی است</div>
                </div>


                <div class="d-flex flex-wrap justify-content-end gap-2 mt-4"><a class="btn btn-outline-secondary"
                        href="{% url 'accounts:users' %}">انصراف</a><button class="btn btn-primary" type="submit"><i
                            class="bi bi-person-check" aria-hidden="true"></i> ایجاد گروه</button>
                </div>
            </div>
        </form>
    </div>


</section>



{% endblock %}
